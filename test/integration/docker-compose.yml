services:
  mariadb:
    image: mariadb:10.11.8
    environment:
      MARIADB_DATABASE: swarm
      MARIADB_USER: swarm
      MARIADB_PASSWORD: swarm-test-only
      MARIADB_ROOT_PASSWORD: root-test-only
    ports:
      - "127.0.0.1:13307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 2s
      retries: 30

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    command: ["-host", "0.0.0.0", "-config", "/config/toxiproxy.json"]
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "127.0.0.1:13306:13306"
      - "127.0.0.1:18474:8474"
    volumes:
      - ./toxiproxy.json:/config/toxiproxy.json:ro
    healthcheck:
      test: ["CMD", "/toxiproxy-cli", "-host", "127.0.0.1:8474", "list"]
      interval: 2s
      timeout: 2s
      retries: 30
